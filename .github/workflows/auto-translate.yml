# ============================================================
# auto-translate.yml
#
# 触发条件：docs-source/ 下有 .md 文件变更时自动运行
#
# 完整流水线：
#   Step 1  中文 MD → 中文 MDX        (md-to-mintlify.js)
#   Step 2  中文 MD → 英文 MD         (translate-docs.js，需要 OPENAI_API_KEY)
#   Step 3  英文 MD → 英文 MDX        (md-to-mintlify.js，输出到 en/)
#   Step 4  提交所有生成文件
#
# GitHub Secrets 配置（仓库 Settings → Secrets and variables → Actions）：
#   OPENAI_API_KEY     — 必填，OpenAI 兼容接口 key
#   ANTHROPIC_API_KEY  — 选填，切换 --provider anthropic 时使用
# ============================================================

name: Auto-translate docs-source to Mintlify MDX

on:
  push:
    branches: [main]
    paths:
      - "docs-source/**/*.md"

  workflow_dispatch:
    inputs:
      force_all:
        description: "强制重新处理所有文件（忽略缓存）"
        type: boolean
        default: false

jobs:
  translate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # ── Step 1：中文 MD → 中文 MDX ───────────────────────────────────────────
      - name: "[1/3] 中文 MD → 中文 MDX"
        run: |
          if [ "${{ github.event.inputs.force_all }}" = "true" ]; then
            echo "全量模式：转换 docs-source/ 所有文件"
            node scripts/md-to-mintlify.js docs-source/ .
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'docs-source/**/*.md' 2>/dev/null || true)
            if [ -z "$CHANGED" ]; then
              echo "无变更文件，跳过。"
              exit 0
            fi
            echo "变更文件：$CHANGED"
            for file in $CHANGED; do
              [ -f "$file" ] || continue
              OUT="${file#docs-source/}"
              OUT="${OUT%.md}.mdx"
              node scripts/md-to-mintlify.js "$file" "$OUT"
            done
          fi

      # ── Step 2：中文 MD → 英文 MD ────────────────────────────────────────────
      - name: "[2/3] 中文 MD → 英文 MD"
        run: |
          FORCE=""
          [ "${{ github.event.inputs.force_all }}" = "true" ] && FORCE="--force"
          node scripts/translate-docs.js docs-source/ docs-source-en/ $FORCE

      # ── Step 3：英文 MD → 英文 MDX ──────────────────────────────────────────
      - name: "[3/3] 英文 MD → 英文 MDX"
        run: node scripts/md-to-mintlify.js docs-source-en/ en/

      # ── Step 4：提交所有生成文件 ─────────────────────────────────────────────
      - name: Commit generated files
        run: |
          git config user.name "docs-bot"
          git config user.email "bot@waffo.com"
          git add --force docs-source-en/ en/ || true
          git add "*.mdx" "**/*.mdx" 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "无变更，跳过提交。"
          else
            git commit -m "chore: auto-generate MDX and English translations [skip ci]"
            git push
          fi
